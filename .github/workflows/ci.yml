name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      # Printed unconditionally: when a build breaks after a runner image
      # update, the toolchain version is the first thing worth knowing.
      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      # Templates are compiled in, from a generated file that is committed.
      # Regenerating must be a no-op, or the binary ships templates that differ
      # from the ones in the repository.
      - name: Templates are in sync
        run: |
          make templates
          git diff --exit-code -- Sources/ScaffoldCore/Generated

      - name: Build
        run: swift build --build-tests

      - name: Test
        run: swift test

  e2e:
    name: Generated projects build and test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Install XcodeGen and CocoaPods
        run: brew install xcodegen cocoapods

      # A default `init` makes the first commit, and a fresh runner has nobody
      # to attribute it to.
      - name: Configure a git identity
        run: |
          git config --global user.name "xscaffold CI"
          git config --global user.email "ci@xscaffold.invalid"

      - name: Generate, build and test every variant
        run: make e2e

  lint:
    name: Lint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Install tools
        run: brew install swiftlint swiftformat

      - name: SwiftFormat
        run: swiftformat --lint .

      - name: SwiftLint
        run: swiftlint --strict

      # The templates ship lint configuration, so `make lint` in a freshly
      # generated project has to pass. It did not until this check existed:
      # where `@testable import <ProjectName>` sorts depends on the project's
      # name, which no template can be written to satisfy in advance.
      - name: Generated projects pass their own linters
        run: |
          MATERIALISE_ROOT="$RUNNER_TEMP/generated" swift test --filter MaterialiseTemplates
          for project in "$RUNNER_TEMP"/generated/*/; do
            echo "==> $project"
            ( cd "$project" && swiftformat --lint . && swiftlint --strict )
          done
