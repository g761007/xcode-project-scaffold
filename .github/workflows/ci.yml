name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      # Printed unconditionally: when a build breaks after a runner image
      # update, the toolchain version is the first thing worth knowing.
      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build
        run: swift build --build-tests

      - name: Test
        run: swift test

  lint:
    name: Lint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7

      - name: Install tools
        run: brew install swiftlint swiftformat

      - name: SwiftFormat
        run: swiftformat --lint .

      - name: SwiftLint
        run: swiftlint --strict
